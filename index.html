<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Brain--Computer Interface Fear and Expertise Survey</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        fieldset {
            margin-bottom: 20px;
            padding: 15px;
        }
        label {
            display: block;
            margin: 8px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }

        .chartContainer {
            width: 40vw;
            height: 40vh;
            margin: 20px auto;
        }

    </style>
</head>
<body>

<h1>Expertise and Fear Assessment</h1>

<form id="surveyForm">

    <fieldset>
        <legend>About You</legend>

        <label>
            Age Group
            <select id="ageGroup">
                <option value="">Select</option>
                <option value="under13">Under 13</option>
                <option value="13-15">13-15</option>
                <option value="16-18">16-18</option>
                <option value="19-21">19-21</option>
                <option value="22-29">22-30</option>
                <option value="30-39">31-39</option>
                <option value="40+">40+</option>
            </select>
        </label>

        <label id="backgroundLabel">
            Background/Interests:
            <select id="background">
                <option value="">Select</option>
            </select>
        </label>
    </fieldset>

    <fieldset>
        <legend>Expertise Questions (1 = None, 5 = Expert)</legend>

        <label for="eQ1">
            How familiar are you with brain–computer interfacing(BCIs) technology?
            <input type="number" min="1" max="5" data-weight="1.5" class="expertise" id="eQ1">
        </label>

        <label for="eQ2">
            How knowledgeable are you on the clinical application of BCIs?
            <input type="number" min="1" max="5" data-weight="1.5" class="expertise" id="eQ2">
        </label>

        <label for="eQ3">
            How well do you understand the inner workings of a BCI?
            <input type="number" min="1" max="5" data-weight="2" class="expertise" id="eQ3">
        </label>

        <label for="eQ4">
            How much exposure have you had to scientific journals, documentaries, or other forms of reliable media about BCIs?
            <input type="number" min="1" max="5" data-weight="1" class="expertise" id="eQ4">
        </label>

        <label>
            Have you ever studied this field?
            <br>
            <input type="radio" name="studyE" value="5" data-weight="2" class="expertise" id="eQ5Y"> Yes
        </label>
        <label>
            <input type="radio" name="studyE" value="1" data-weight="2" class="expertise" id="eQ5N"> No
        </label>

        <div>
            <label for="leqE">What do you believe is the most important current use of brain–computer interfaces?</label>
            <textarea id="leqE" name="reaction_description" rows="5" placeholder="Enter your detailed response here..."></textarea>
        </div>

    </fieldset>

    <fieldset>
        <legend>Fear Questions (1 = Not Afraid 5 = Terrified)</legend>

        <label for="fQ1">
            How concerned are you that BCIs could compromise your personal privacy?
            <input type="number" min="1" max="5" data-weight="2" class="fear" id="fQ1">
        </label>

        <label for="fQ2">
            How concerned are you that BCIs could control or influence your thoughts or actions?
            <input type="number" min="1" max="5" data-weight="2" class="fear" id="fQ2">
        </label>

        <label for="fQ3">
            How concerned are you that corporations and governments will misuse this technology?
            <input type="number" min="1" max="5" data-weight="1.5" class="fear" id="fQ3">
        </label>

        <label for="fQ4">
            How concerned are you about BCIs long term impact on society?
            <input type="number" min="1" max="5" data-weight="1.5" class="fear" id="fQ4">
        </label>

        <label for="fQ5">
            How likely would you be to use a BCI yourself?
            <input type="number" min="1" max="5" data-weight="1" class="fear" id="fQ5">
        </label>

        <div>
            <label for="leqF">What is your biggest concern, if any, about brain-computer interfacing technology?</label>
            <textarea id="leqF" name="reaction_description" rows="5" placeholder="Enter your detailed response here..."></textarea>
        </div>
    </fieldset>



    <button type="submit">Submit</button>
</form>

<div class="chartBox" id="result">
</div>

<p id="output"></p>

<div class="chartContainer">
    <canvas id="chart"></canvas>
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCcmtwDG8v8xFrE_O_rG4iGx4Ffml_k4mY",
      authDomain: "bci-survey.firebaseapp.com",
      projectId: "bci-survey",
      storageBucket: "bci-survey.firebasestorage.app",
      messagingSenderId: "393276914994",
      appId: "1:393276914994:web:180298eff945f796cf2b2b",
      measurementId: "G-752C89XBK1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
    window.serverTimestamp = serverTimestamp;

</script>

<script>

    const ageGroupSelect = document.getElementById("ageGroup");
    const backgroundSelect = document.getElementById("background");


    ageGroupSelect.addEventListener("change", () => {
        backgroundSelect.innerHTML = '<option value="">Select</option>';

        const age = ageGroupSelect.value;

        let options = [];

        if (age === "under13" || age === "13-15" || age === "16-18") {
            options = [
                "Art",
                "Science",
                "History",
                "Sports",
                "English",
                "Math"
            ];
        } else {
            options = [
                "Art",
                "Science",
                "History",
                "Sports",
                "English",
                "Math",
                "Theology",
                "Language",
                "Buisness",
                "Medical"
            ];
        }

        options.forEach(opt => {
            const option = document.createElement("option");
            option.value = opt;
            option.textContent = opt;
            backgroundSelect.appendChild(option);
        });
    });


    function displayValue() {
        const fQ1Input = document.getElementById('fQ1');
        const value = fQ1Input.value;

        console.log("fQ1A is:", value);
    }

    const form = document.getElementById("surveyForm");
    const resultDiv = document.getElementById("result");
    const ctx = document.getElementById("chart").getContext("2d");

    let chart;

    function calculateWeightedAverage(inputs) {
        let total = 0;
        let weightSum = 0;

        inputs.forEach(input => {
            const value = Number(input.value);
            const weight = Number(input.dataset.weight);

            total += value * weight;
            weightSum += weight;
        });

        return total / weightSum;
    }

    function categorize(score , type) {
        if (type === "expertise") {
            if (score < 2.5) return "Low Expertise";
            if (score < 4) return "Moderate Expertise";
            return "High Expertise";
        } else {
            if (score < 2.5) return "Low Fear";
            if (score < 4) return "Moderate Fear";
            return "High Fear";
        }
    }

form.addEventListener("submit", async function (e) {
    e.preventDefault();

    if (!ageGroupSelect.value || !backgroundSelect.value) {
        alert("Please select your age group and background.");
        return;
    }

    const expertiseInputs = document.querySelectorAll(".expertise");
    const fearInputs = document.querySelectorAll(".fear");

    const studySelected = document.querySelector('input[name="studyE"]:checked');
    if (!studySelected) {
        alert("Please answer whether you have studied this field.");
        return;
    }

    const numericInputs = [...expertiseInputs, ...fearInputs]
        .filter(input => input.type === "number");

    if (numericInputs.some(input => input.value === "")) {
        alert("Please answer all expertise and fear questions.");
        return;
    }

    const expertiseArray = [];
    const expertiseResponses = {};
    const fearResponses = {};

    expertiseInputs.forEach(input => {
        if (input.type === "radio") {
            if (input.checked) {
                expertiseArray.push(input);
                expertiseResponses[input.id] = {
                    value: Number(input.value),
                    weight: Number(input.dataset.weight)
                };
            }
        } else {
            expertiseArray.push(input);
            expertiseResponses[input.id] = {
                value: Number(input.value),
                weight: Number(input.dataset.weight)
            };
        }
    });

    const processedFearInputs = [];

    fearInputs.forEach(input => {
        let value = Number(input.value);

        if (input.id === "fQ5") {
            value = 6 - value;
        }

        processedFearInputs.push({
            value: value,
                weight: Number(input.dataset.weight)
        });

        fearResponses[input.id] = {
            value: value,
                weight: Number(input.dataset.weight)
        };
    });

    const expertiseScore = calculateWeightedAverage(expertiseArray);

    const fearScore = calculateWeightedAverage(
        processedFearInputs.map(item => ({
            value: item.value,
                dataset: { weight: item.weight }
        }))
    );

    const expertiseCategory = categorize(expertiseScore, "expertise");
    const fearCategory = categorize(fearScore, "fear");

    resultDiv.innerText =
        `Expertise: ${expertiseCategory} (${expertiseScore.toFixed(2)})
        Fear: ${fearCategory} (${fearScore.toFixed(2)})`;

    await addDoc(collection(db, "responses"), {
        ageGroup: ageGroupSelect.value,
        background: backgroundSelect.value,
        expertiseScore,
        fearScore,
        expertiseCategory,
        fearCategory,
        expertiseResponses,
        fearResponses,
        freeResponseExpertise: document.getElementById("leqE").value,
        freeResponseFear: document.getElementById("leqF").value,
        timestamp: serverTimestamp()
    });

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'User Position',
                data: [{
                    x: expertiseScore,
                    y: fearScore,
                }],
                pointRadius: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    min: 1,
                    max: 5,
                    title: {
                        display: true,
                        text: 'Expertise'
                    }
                },
                y: {
                    min: 1,
                    max: 5,
                    title: {
                        display: true,
                        text: 'Fear'
                    }
                }
            }
        }
    });
});

</script>


</body>
</html>
